# Staging overrides for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
#
# Staging mirrors production configuration (MongoDB auth, log rotation)
# but uses different ports and a separate database so it can run
# alongside production on the same host without conflict.
#
# Differences from production:
#   - Frontend on port 8080 (not 80)
#   - Separate staging database: books_staging
#   - NODE_ENV=staging
#   - restart: unless-stopped (not always — staging is managed manually)

services:
  mongo:
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
      - MONGO_INITDB_DATABASE=books_staging
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    restart: unless-stopped
    environment:
      - PORT=5001
      - NODE_ENV=staging
      - MONGO_URI=mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}@mongo:27017/books_staging?authSource=admin
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:8080}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    restart: unless-stopped
    ports: !override
      - "8080:80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
